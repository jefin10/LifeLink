services:
  mongo:
    image: mongo:7
    container_name: lifelink-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: lifelink-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/lifelink
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      PORT: 5000
      NODE_ENV: production
      COOKIE_SECURE: "false"
      CORS_ORIGINS: "http://localhost:5173,http://localhost"
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: lifelink-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
